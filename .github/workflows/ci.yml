name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: build · lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build (core + cli + gui main)
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit · PROP · GOLD · BDD · integration
        run: npm test
      - name: No-network backstop (§17 R9)
        run: npm run verify:no-network
      - name: Regenerate acceptance evidence
        run: npm run evidence

  judge:
    name: JUDGE · GUI presentation (Chromium, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Run JUDGE harness (xvfb)
        run: xvfb-run -a npm run judge
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-screenshots
          path: acceptance/evidence/screenshots/
