name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: build · lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # §19 R06 — stamp the date/build version (YYYY.M.D[.N]) into @stint/core before the build,
      # so the built artifacts and the GOLD version contract see a real version, not the dev
      # sentinel. STINT_BUILD_N is the same-day build counter: 1 + the number of release tags
      # already cut for today's date (so the first same-day release has no suffix, the second is
      # `.2`, etc.). On PR builds it is deterministic from the date alone (no tag lookup needed);
      # the actual publish/tag workflow that consumes the echoed version is §19 R05.
      - name: Stamp version (§19 R06)
        run: |
          today="$(date -u +%Y.%-m.%-d)"
          n="$(( $(git tag -l "${today}*" | wc -l) + 1 ))"
          STINT_BUILD_N="$n" npm run version:stamp
      - name: Build (core + cli + gui main)
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit · PROP · GOLD · BDD · integration
        run: npm test
      - name: No-network backstop (§17 R9)
        run: npm run verify:no-network
      - name: Regenerate acceptance evidence
        run: npm run evidence

  judge:
    name: JUDGE · GUI presentation (Chromium, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium
      - name: Run JUDGE harness (xvfb)
        run: xvfb-run -a npm run judge
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-screenshots
          path: acceptance/evidence/screenshots/
