<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>Stint — Report</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="mast">
        <div class="wordmark">stint</div>
        <div class="summary">report builder</div>
      </header>
      <!-- §08 R3 / §12 R8: the GUI report builder. The core report() + the `report` IPC
           channel (parity with `tt report`) already exist; this view is the discoverability
           surface over them. The Billable control is the §08 R3 three-way toggle — reports
           default to billable-only, with a switch to All or Non-billable — driven entirely
           by re-running window.stint.report with the chosen billableFilter. -->
      <nav class="nav">
        <button type="button" class="nav-link" data-nav="index">Timer</button>
        <button type="button" class="nav-link active" aria-current="page">Report</button>
      </nav>

      <section class="report">
        <!-- §09 R1: the date-range picker. The five presets resolve through core's
             resolveRange (via the `report` IPC channel's `preset` field) — never re-derived
             here — and the Custom mode passes the user's explicit from/to straight through.
             The resolved window is painted back into .report-range so the chosen range is
             always visible. Default selection is This week (the at-a-glance figure). -->
        <div class="report-ctrl">
          <span class="report-lab">Range</span>
          <div class="seg presets" id="preset-seg" role="group" aria-label="Date range">
            <button type="button" class="preset" data-preset="today">Today</button>
            <button type="button" class="preset on" data-preset="week" aria-pressed="true">This week</button>
            <button type="button" class="preset" data-preset="last-week">Last week</button>
            <button type="button" class="preset" data-preset="month">This month</button>
            <button type="button" class="preset" data-preset="last-month">Last month</button>
            <button type="button" class="preset" data-preset="custom">Custom…</button>
          </div>

          <!-- Custom mode: two local datetime inputs passed straight through as from/to.
               Hidden until the Custom preset is chosen. -->
          <div class="custom-range" id="custom-range" hidden>
            <label class="report-lab" for="range-from">From</label>
            <input id="range-from" class="report-field" type="datetime-local" aria-label="Range from" />
            <label class="report-lab" for="range-to">To</label>
            <input id="range-to" class="report-field" type="datetime-local" aria-label="Range to" />
            <button type="button" class="report-apply" id="range-apply">Apply</button>
          </div>

          <span class="report-lab">Group by</span>
          <div class="seg" id="by-seg" role="group" aria-label="Group by">
            <button type="button" class="seg-btn on" data-by="client">Client</button>
            <button type="button" class="seg-btn" data-by="project">Project</button>
            <button type="button" class="seg-btn" data-by="day">Day</button>
            <button type="button" class="seg-btn" data-by="tag">Tag</button>
          </div>

          <!-- §08 R3: the billable filter — billable-only by default, with All and
               Non-billable. Exactly one segment is active; clicking re-runs the report. -->
          <span class="report-lab">Billable</span>
          <div class="seg" id="billable-seg" role="group" aria-label="Billable filter">
            <button type="button" class="seg-btn on" data-billable="billable" aria-pressed="true">
              Billable only
            </button>
            <button type="button" class="seg-btn" data-billable="all" aria-pressed="false">All</button>
            <button type="button" class="seg-btn" data-billable="non-billable" aria-pressed="false">
              Non-billable
            </button>
          </div>

          <!-- §09 R3: the client / project / tag filters. Each narrows the report to a
               single client/project/tag (the §09 R3 / §12 R8 filter set, mirroring tt
               report's --client/--project/--tag). An unselected client/project means "no
               filter" (the All option, value ""); the renderer sends the entity id (never a
               name — it resolves nothing) and an empty tag is omitted. The project options
               depend on the chosen client; selecting a client repopulates them. The controls
               stay in restrained system grays — no accent (§15 accent discipline). -->
          <span class="report-lab">Client</span>
          <div class="report-row">
            <select id="f-client" class="report-field" aria-label="Filter by client">
              <option value="">All clients</option>
            </select>
            <select id="f-project" class="report-field" aria-label="Filter by project">
              <option value="">All projects</option>
            </select>
          </div>

          <span class="report-lab">Tag</span>
          <div class="report-row">
            <input id="f-tag" class="report-field" type="text" placeholder="Filter by tag" autocomplete="off" aria-label="Filter by tag" />
          </div>

          <span class="report-lab">Rounding</span>
          <div class="report-row">
            <label class="report-toggle">
              <input id="rounding" type="checkbox" />
              Round grouped totals
            </label>
            <select id="rounding-increment" class="report-field" aria-label="Rounding increment">
              <option value="15">nearest 15 min</option>
              <option value="6">nearest 6 min</option>
              <option value="10">nearest 10 min</option>
              <option value="30">nearest 30 min</option>
            </select>
          </div>
        </div>

        <div class="report-summary">
          <div class="report-head">
            <span id="report-caption">This week · billable only</span>
            <span>Total <b id="report-total">0h 00m</b></span>
          </div>
          <!-- §09 R1: the resolved window the report covers, painted from the Report's
               own rangeFromUtc → rangeToUtc so the chosen range is always visible. -->
          <div class="report-range" id="report-range"></div>
          <table class="report-table">
            <thead>
              <tr>
                <th>Group</th>
                <th class="num">Billable</th>
              </tr>
            </thead>
            <tbody id="report-rows"></tbody>
            <tfoot>
              <tr class="report-tot">
                <td>Total</td>
                <td class="num" id="report-grand">0h 00m</td>
              </tr>
            </tfoot>
          </table>
        </div>

        <!-- §09 R6: Export CSV / Export JSON. The on-screen summary above is the at-a-glance
             view; these buttons write the raw entries for the chosen range to a file via the
             OS save dialog (round-tripped through the main process, since the renderer cannot
             touch fs). They mirror `tt export --csv/--json`. The buttons stay monochrome —
             the accent is reserved for the primary action elsewhere (§15 accent discipline);
             a small status line confirms the write (or a cancel). -->
        <div class="report-export">
          <button type="button" id="export-csv" class="report-export-btn">Export CSV</button>
          <button type="button" id="export-json" class="report-export-btn">Export JSON</button>
          <span id="export-status" class="report-export-status" role="status" aria-live="polite"></span>
        </div>
      </section>
    </div>
    <script src="util.js"></script>
    <script src="report.js"></script>
  </body>
</html>
