<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>Stint</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popover">
    <div class="pop idle" id="pop">
      <div class="pop-top">
        <div class="pop-state" id="state"><span class="pop-dot"></span> idle</div>
        <div id="count" class="pop-clock tnum">00:00:00</div>
        <div class="pop-desc" id="desc" hidden></div>
        <div class="pop-ctx" id="ctx">nothing running</div>
        <div class="pop-tags" id="tags" hidden></div>
      </div>
      <div class="pop-act">
        <button class="btn primary" id="toggle" aria-label="Start timer" aria-pressed="false">Start</button>
      </div>
      <div class="pop-foot">
        <button class="pop-open" id="open" aria-label="Open the main Stint window">Open Stint</button>
      </div>
    </div>
    <script src="util.js"></script>
    <script src="popover.js"></script>
  </body>
</html>
