<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>Stint</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="mast">
        <div class="wordmark">stint</div>
        <div class="summary" id="summary">— idle</div>
      </header>
      <div class="toolbar">
        <button class="primary" id="toggle">Start</button>
        <button id="report-btn" class="ghost">This week: <span id="week-total">0.00h</span></button>
      </div>
      <main id="entries"></main>
    </div>
    <script src="util.js"></script>
    <script src="app.js"></script>
  </body>
</html>
