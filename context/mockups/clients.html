<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stint — Clients</title>
<style>
  :root{
    --paper:#FFFDFA;--canvas:#EDE6DA;--sidebar:#F7F2EA;--sunken:#F4EEE3;--hover:#F0E8DB;
    --ink:#23201B;--muted:#6F685C;--faint:#A99F8E;--line:#ECE5D8;--line-strong:#DDD4C3;
    --accent:#C8623E;--accent-ink:#A1492A;--accent-weak:#F7ECE3;
    --run:#5E8C5A;--run-weak:#ECF2E7;--warn-ink:#8A6320;--warn-bg:#F8EFD8;--warn-line:#E7D6AC;
    --danger:#B23B2B;--danger-weak:#F8E9E4;
    --r1:8px;--r2:12px;--r3:16px;
    --ring:0 0 0 3px #C8623E33;
    --sh-card:0 4px 16px rgba(74,52,24,.07), 0 1px 2px rgba(74,52,24,.05);--sh-raise:0 8px 24px rgba(74,52,24,.10), 0 1px 3px rgba(74,52,24,.06);--sh-pop:0 16px 44px rgba(60,42,18,.20), 0 2px 6px rgba(60,42,18,.10);--sh-modal:0 28px 70px rgba(50,34,14,.30), 0 3px 10px rgba(50,34,14,.14);--sh-win:0 30px 80px rgba(50,34,14,.22);
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI Variable","Segoe UI","Helvetica Neue",system-ui,sans-serif;
    --num:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .ic{width:16px;height:16px;display:inline-block;flex:none;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px}
  /* window chrome */
  .win{max-width:1040px;margin:34px auto 10px;background:var(--paper);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh-win);border:1px solid #DDD4C3}
  .bar{height:42px;display:flex;align-items:center;background:#F1EBE0;border-bottom:1px solid var(--line);position:relative}
  .lights{display:flex;gap:8px;padding-left:18px}.lights i{width:12px;height:12px;border-radius:50%;display:block}
  .lights .r{background:#e8795f}.lights .y{background:#e7b34e}.lights .g{background:#7fae6a}
  .bar .t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);font-weight:590;pointer-events:none}
  .prov{max-width:1040px;margin:0 auto 30px;text-align:center;font-size:11px;color:#A99F8E;padding:4px 14px}
  /* shell + sidebar */
  .shell{display:flex;min-height:600px}
  .nav{width:212px;flex:none;background:var(--sidebar);border-right:1px solid var(--line);padding:16px 12px;display:flex;flex-direction:column;gap:2px}
  .nav a{display:flex;align-items:center;gap:12px;height:38px;padding:0 12px;border-radius:var(--r1);color:var(--ink);text-decoration:none;font-weight:500}
  .nav a .ic{color:var(--muted)}
  .nav a:hover{background:var(--hover)}
  .nav a.on{background:var(--accent-weak);color:var(--accent-ink);font-weight:590;box-shadow:inset 0 0 0 1px #C8623E22}
  .nav a.on .ic{color:var(--accent)}
  .nav .sp{flex:1}
  .nav .stat{margin:8px 6px 2px;padding:14px 8px 4px;border-top:1px solid var(--line)}
  .nav .stat .k{font-size:11px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase}
  .nav .stat .v{font-weight:640;font-size:14px;margin:5px 0 3px}
  .nav .stat a{display:inline-flex;align-items:center;gap:5px;height:auto;padding:0;background:none;color:var(--accent-ink);font-weight:500;font-size:12px}
  .nav .stat a:hover{background:none;text-decoration:underline}
  .nav .stat a .ic{width:13px;height:13px;color:var(--accent-ink)}
  /* view */
  .view{flex:1;min-width:0;display:flex;flex-direction:column;padding:24px 28px}
  .vhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .vtitle{font-size:18px;font-weight:640;margin:0;letter-spacing:-.01em}
  /* buttons */
  .btn{font:inherit;font-weight:590;display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 14px;border-radius:var(--r1);border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);cursor:pointer;white-space:nowrap;transition:background .12s,box-shadow .12s}
  .btn:hover{background:var(--hover)}
  .btn .ic{width:15px;height:15px;color:var(--muted)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 1px 2px #C8623E55}
  .btn.primary:hover{background:#b9582f}
  .btn.primary .ic{color:#fff}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
  .btn.ghost:hover{background:var(--hover);color:var(--ink)}
  .btn.danger{color:var(--danger);border-color:transparent;background:transparent}
  .btn.danger:hover{background:var(--danger-weak)}
  .btn.sm{height:30px;padding:0 11px;font-size:12px}
  .iconbtn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--r1);border:0;background:none;color:var(--faint);cursor:pointer}
  .iconbtn:hover{background:var(--hover);color:var(--ink)}
  /* segmented */
  .seg{display:inline-flex;background:var(--sunken);border:1px solid var(--line);border-radius:var(--r1);padding:3px;gap:3px}
  .seg button{font:inherit;font-size:12px;border:0;background:none;color:var(--muted);height:26px;padding:0 12px;border-radius:5px;cursor:pointer;white-space:nowrap}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--paper);color:var(--ink);font-weight:590;box-shadow:0 1px 2px rgba(74,52,24,.12)}
  /* toggle */
  .toggle{display:inline-flex;align-items:center;gap:10px;color:var(--ink)}
  .sw{width:36px;height:21px;border-radius:999px;background:#d7cdba;position:relative;flex:none;cursor:pointer;transition:background .12s}
  .sw i{position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(74,52,24,.25);transition:left .12s}
  .sw.on{background:var(--accent)}.sw.on i{left:17px}
  /* fields */
  .lab{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field{font:inherit;width:100%;background:var(--paper);border:1px solid var(--line-strong);border-radius:var(--r1);padding:8px 11px;color:var(--ink)}
  .field:focus{outline:none;border-color:var(--accent);box-shadow:var(--ring)}
  textarea.field{resize:vertical;min-height:42px}
  select.field{width:auto;min-width:150px}
  /* card / tag / pill */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r2);box-shadow:var(--sh-card)}
  .tag{font-size:11.5px;color:var(--muted);background:var(--sunken);border:1px solid var(--line);border-radius:999px;padding:2px 10px;display:inline-flex;align-items:center;gap:6px}
  .tag b{color:var(--faint);cursor:pointer;font-weight:400}
  .pill{font-size:11px;border-radius:999px;padding:2px 10px;border:1px solid var(--line-strong);color:var(--muted);background:var(--sunken);white-space:nowrap}
  .pill.run{color:var(--run);background:var(--run-weak);border-color:#5E8C5A44}
  .pill.warn{color:var(--warn-ink);background:var(--warn-bg);border-color:var(--warn-line)}
  .pill.accent{color:var(--accent-ink);background:var(--accent-weak);border-color:#C8623E33}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block}.dot.run{background:var(--run)}
  .meta{color:var(--muted)}.cap{font-size:12px;color:var(--faint)}

  /* clients view */
  .view{gap:22px}
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .sec-h h3{font-size:14px;font-weight:640;margin:0}
  .sec-h .cap{margin-left:10px;font-weight:400}
  .clist{display:flex;flex-direction:column;gap:12px}
  .cl{padding:4px 6px 6px}
  .cl-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r1)}
  .cl-row:hover{background:var(--sunken)}
  .cl-row .nm{font-weight:590;font-size:13.5px}
  .cl-row.client .nm{font-size:14px;font-weight:640}
  .cl-row .acts{margin-left:auto;display:flex;gap:6px;align-items:center}
  .cl-row .count{color:var(--faint);font-size:11.5px;margin-left:2px}
  .proj{position:relative;margin-left:18px;padding-left:18px;border-left:2px solid var(--line-strong)}
  .proj .cl-row{padding:9px 12px}
  .proj .cl-row .nm{font-weight:500;color:var(--ink)}
  .cl.arch .cl-row.client .nm{color:var(--muted)}
  .empty{color:var(--faint);font-size:12px;padding:8px 12px}
  .taglist{display:flex;flex-direction:column}
  .tg-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r1)}
  .tg-row:hover{background:var(--sunken)}
  .tg-row + .tg-row{border-top:1px solid var(--line)}
  .tg-row .acts{margin-left:auto;display:flex;gap:6px;align-items:center}
</style>
</head>
<body>

<div class="win">
  <div class="bar"><div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div><div class="t">Stint — Clients</div></div>
  <div class="shell">
    <nav class="nav">
  <a href="timer.html"><svg class="ic"><use href="#i-clock"/></svg> Timer</a>
  <a href="main.html"><svg class="ic"><use href="#i-list"/></svg> Entries</a>
  <a href="#" class="on"><svg class="ic"><use href="#i-users"/></svg> Clients</a>
  <a href="reports.html"><svg class="ic"><use href="#i-chart"/></svg> Reports</a>
  <a href="settings.html"><svg class="ic"><use href="#i-settings"/></svg> Settings</a>
  <span class="sp"></span>
  <div class="stat"><div class="k">This week</div><div class="v tnum">21h 35m billable</div><a href="reports.html">Open in Reports <svg class="ic"><use href="#i-arrow"/></svg></a></div>
</nav>
    <div class="view">

      <div class="vhead">
        <h2 class="vtitle">Clients</h2>
        <button class="btn primary"><svg class="ic"><use href="#i-plus"/></svg> Add client</button>
      </div>

      <div>
        <div class="sec-h"><h3>Clients &amp; projects</h3></div>
        <div class="clist">

          <div class="card cl">
            <div class="cl-row client">
              <svg class="ic" style="color:var(--muted)"><use href="#i-users"/></svg>
              <span class="nm">Acme</span><span class="count">2 projects · 14h 20m</span>
              <span class="acts">
                <button class="btn sm ghost"><svg class="ic"><use href="#i-plus"/></svg> Add project</button>
                <button class="btn sm ghost"><svg class="ic"><use href="#i-edit"/></svg> Rename</button>
                <button class="btn sm ghost">Archive</button>
              </span>
            </div>
            <div class="proj">
              <div class="cl-row"><span class="nm">API</span><span class="count">9h 00m</span>
                <span class="acts"><button class="btn sm ghost"><svg class="ic"><use href="#i-edit"/></svg> Rename</button><button class="btn sm ghost">Archive</button></span>
              </div>
              <div class="cl-row"><span class="nm">Web</span><span class="count">5h 20m</span>
                <span class="acts"><button class="btn sm ghost"><svg class="ic"><use href="#i-edit"/></svg> Rename</button><button class="btn sm ghost">Archive</button></span>
              </div>
            </div>
          </div>

          <div class="card cl">
            <div class="cl-row client">
              <svg class="ic" style="color:var(--muted)"><use href="#i-users"/></svg>
              <span class="nm">Globex</span><span class="count">1 project · 6h 15m</span>
              <span class="acts">
                <button class="btn sm ghost"><svg class="ic"><use href="#i-plus"/></svg> Add project</button>
                <button class="btn sm ghost"><svg class="ic"><use href="#i-edit"/></svg> Rename</button>
                <button class="btn sm ghost">Archive</button>
              </span>
            </div>
            <div class="proj">
              <div class="cl-row"><span class="nm">Onboarding</span><span class="count">6h 15m</span>
                <span class="acts"><button class="btn sm ghost"><svg class="ic"><use href="#i-edit"/></svg> Rename</button><button class="btn sm ghost">Archive</button></span>
              </div>
            </div>
          </div>

          <div class="card cl arch">
            <div class="cl-row client">
              <svg class="ic" style="color:var(--faint)"><use href="#i-users"/></svg>

              <span class="acts">

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
